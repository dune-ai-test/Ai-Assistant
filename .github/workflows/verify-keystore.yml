name: Keystore Verification

on:
  workflow_dispatch:

jobs:
  verify-keystore:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Verify keystore secrets
      run: |
        echo "Checking keystore secrets..."
        
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "ERROR: KEYSTORE_BASE64 is not set"
          exit 1
        fi
        
        if [ -z "$KEYSTORE_PASSWORD" ]; then
          echo "ERROR: KEYSTORE_PASSWORD is not set"
          exit 1
        fi
        
        if [ -z "$KEY_ALIAS" ]; then
          echo "ERROR: KEY_ALIAS is not set"
          exit 1
        fi
        
        if [ -z "$KEY_PASSWORD" ]; then
          echo "ERROR: KEY_PASSWORD is not set"
          exit 1
        fi
        
        echo "All secrets are present"
        
        # Decode and verify keystore
        echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
        
        echo "Verifying keystore contents..."
        keytool -list -keystore /tmp/release.keystore -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" || {
          echo "ERROR: Keystore verification failed"
          exit 1
        }
        
        echo "Keystore verified successfully"
        
        # Clean up
        rm -f /tmp/release.keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
