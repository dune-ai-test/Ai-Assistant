name: Build Release APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

    - name: Build Release APK
      run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

    - name: Get version from build.gradle
      id: version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Detected version: $VERSION"

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk-v${{ steps.version.outputs.version }}
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Delete existing release and tag
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release delete "v${{ steps.version.outputs.version }}" --yes --cleanup-tag || true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release v${{ steps.version.outputs.version }}
        target_commitish: ${{ github.sha }}
        files: app/build/outputs/apk/release/*.apk
        generate_release_notes: true

    - name: Cleanup keystore
      if: always()
      run: rm -f release.keystore
